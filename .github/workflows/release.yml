name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build .app bundle
        run: Scripts/build-app.sh

      # Signing identity comes from SIGN_IDENTITY (default "-" = ad-hoc). To
      # ship a notarized build later, add a Developer ID to the keychain in a
      # prior step and set SIGN_IDENTITY here — no other change needed.
      - name: Sign
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY || '-' }}
        run: Scripts/sign.sh

      - name: Build DMG
        run: Scripts/make-dmg.sh

      # No-op unless the APPLE_NOTARY_* secrets are set, so the default ad-hoc
      # release passes straight through. Populate these secrets (and a
      # Developer ID for the Sign step) to switch on notarization with zero
      # pipeline restructuring.
      - name: Notarize (skipped without secrets)
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: Scripts/notarize.sh

      - name: Upload DMG as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TalkBridgeMenubar.dmg
          body: |
            ## Installation

            The DMG is ad-hoc signed (no Apple Developer ID), so Gatekeeper
            blocks the first launch. Either right-click the app in
            `/Applications` and choose **Öffnen**, or run:

            ```sh
            xattr -dr com.apple.quarantine /Applications/TalkBridgeMenubar.app
            ```

            See the [README](https://github.com/leiverkus/opencode-talk-bridge-menubar#installation)
            for the full first-launch flow.
